name: oral_ulcer_ai
description: "Oral Ulcer AI — Clinical Decision Support for Saveetha Dental College & Hospital"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── Local Database ───────────────────────────────────────────────────────────
  sqflite:          ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path_provider:    ^2.1.4

  # ── Security ─────────────────────────────────────────────────────────────────
  crypto:           ^3.0.3

  # ── Image handling ───────────────────────────────────────────────────────────
  image_picker:     ^1.2.1
  http: ^1.6.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.70.2
  pdf: ^3.11.1
  printing: ^5.13.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^6.0.0
  flutter_launcher_icons: ^0.14.1

# ── App Icon config ──────────────────────────────────────────────────────────
flutter_icons:
  android: true
  ios:     false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#7B1E3A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/